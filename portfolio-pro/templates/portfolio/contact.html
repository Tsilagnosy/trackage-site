{% extends 'base.html' %}

{% block title %}
Contact
{% endblock %}

{% block content %}

<section class="py-16 max-w-3xl mx-auto">

    <h1 class="text-5xl font-bold mb-10">
        Contact
    </h1>

    <form method="POST" class="space-y-6">

        {% csrf_token %}

        <input
            type="text"
            name="name"
            placeholder="Votre nom"
            class="w-full p-4 rounded-xl bg-gray-900 border border-gray-700"
        >

        <input
            type="email"
            name="email"
            placeholder="Votre email"
            class="w-full p-4 rounded-xl bg-gray-900 border border-gray-700"
        >

        <textarea
            name="message"
            rows="6"
            placeholder="Votre message"
            class="w-full p-4 rounded-xl bg-gray-900 border border-gray-700"
        ></textarea>

        <button
            type="submit"
            class="bg-blue-600 px-8 py-4 rounded-xl hover:bg-blue-700"
        >
            Envoyer
        </button>

    </form>

</section>

{% endblock %}

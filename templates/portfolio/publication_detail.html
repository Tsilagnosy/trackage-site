{% extends 'base.html' %}

{% block title %}
{{ publication.title }}
{% endblock %}

{% block content %}

<section class="max-w-4xl mx-auto py-16">

    {% if publication.image %}
    <img
        src="{{ publication.image.url }}"
        class="w-full rounded-2xl mb-10"
    >
    {% endif %}

    <h1 class="text-5xl font-bold mb-6">
        {{ publication.title }}
    </h1>

    <p class="text-gray-500 mb-10">
        {{ publication.created_at }}
    </p>

    <div class="text-lg leading-9 text-gray-300">
        {{ publication.content }}
    </div>

    <div class="mt-10 text-gray-500">
        👁 {{ publication.views }} vues
    </div>

</section>

{% endblock %}
